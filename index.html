  <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woodcut Tool - 高阶版画精修版</title>
    <style>
        :root {
            --bg-dark: #d3d3c9;
            --panel-bg: #faf8f5;
            --preview-bg: #bebabf;
            --preview-surface: #ffffff;
            --text-main: #1a1410;
            --text-muted: #6b5d52;
            --accent: #2d1f15;
            --border-soft: rgba(45, 31, 21, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .app-shell {
            width: 100%; height: 100%;
            display: grid;
            grid-template-columns: 280px 1fr;
            background: var(--bg-dark);
        }

        .control-panel {
            display: flex; align-items: stretch;
            justify-content: flex-start;
            padding: 0; height: 100%;
        }

        .panel-inner {
            background: var(--panel-bg);
            border-right: 1px solid rgba(45, 31, 21, 0.12);
            display: flex; flex-direction: column;
            height: 100%; width: 100%;
        }

        .panel-header {
            padding: 20px 32px 16px;
            border-bottom: 1px solid var(--border-soft);
            display: flex; justify-content: center;
            flex-shrink: 0;
        }

        .panel-header .brand {
            font-size: 18px; font-weight: 700;
            color: var(--accent); letter-spacing: 0.3px;
        }

        .panel-scroll {
            flex: 1; padding: 28px 24px 20px;
            display: flex; flex-direction: column;
            gap: 20px; overflow-y: auto;
            align-items: stretch;
        }

        /* Upload */
        .upload-panel {
            display: flex; flex-direction: column; gap: 12px;
            border-bottom: 1px solid var(--border-soft);
            padding-bottom: 18px;
        }
        #imageUpload { display: none; }
        .upload-area {
            width: 100%; display: flex; align-items: flex-start;
            justify-content: space-between; cursor: pointer;
        }
        .upload-preview {
            width: 104px; aspect-ratio: 1 / 1;
            background: rgba(168, 168, 168, 0.3);
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-soft);
        }
        .upload-icon { font-size: 24px; letter-spacing: 6px; color: #fff; }
        #contentImage { width: 100%; height: 100%; object-fit: cover; display: none; }
        .upload-text { font-size: 13px; font-weight: 600; }

        /* Color */
        .color-palette-section { display: flex; flex-direction: column; gap: 8px; }
        .color-controls {
            display: flex; flex-direction: column; gap: 12px;
            border-bottom: 1px solid var(--border-soft); padding-bottom: 18px;
        }
        .color-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        .color-item { display: flex; align-items: center; gap: 8px; justify-content: space-between; width: 100%; }
        .control-label { font-size: 13px; font-weight: 600; }
        .color-swatch {
            width: 18px; height: 18px; border-radius: 50%;
            border: 1px solid var(--border-soft); cursor: pointer;
        }

        .color-picker-wrapper {
            position: relative; width: 18px; height: 18px;
            border-radius: 50%; border: 1px solid var(--border-soft);
            overflow: hidden; cursor: pointer;
        }
        .color-picker-wrapper input[type="color"] {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; opacity: 0; cursor: pointer;
        }
        .color-display { width: 100%; height: 100%; border-radius: 50%; background: #fff; }

        /* Sliders */
        .controls-wrapper { display: flex; flex-direction: column; gap: 16px; border-bottom: 1px solid var(--border-soft); padding-bottom: 18px;}
        .control-group { display: flex; flex-direction: column; gap: 10px; }
        .control-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
        .control-value { color: var(--accent); font-weight: 700; }
        input[type="range"] {
            width: 100%; appearance: none; height: 2px;
            background: var(--border-soft); outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: var(--accent); cursor: pointer;
        }

        /* Selects */
        .select-wrapper { position: relative; width: 100%; margin-bottom: 10px;}
        .select-wrapper select {
            padding: 8px 40px 8px 12px; border: 1px solid var(--border-soft);
            background: #ffffff; width: 100%; appearance: none; cursor: pointer; font-size: 13px;
        }
        .select-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }
        
        .btn {
            padding: 8px 14px; border: 1px solid var(--border-soft);
            font-size: 13px; font-weight: 600; cursor: pointer; background: transparent;
        }
        .btn-outline:hover { background: rgba(45, 31, 21, 0.05); }

        .download-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .preview-area { background: var(--preview-bg); display: flex; align-items: center; justify-content: center; position: relative; }
        
        .canvas-stage {
            background: #ffffff;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            width: 100%; 
            height: 82vh; 
            max-width: calc(82vh * 0.75); 
            max-height: 82vh;
            aspect-ratio: 3 / 4; 
            margin: auto;
            /* 阴影已按要求去掉 */
            box-shadow: none;
        }
        #styledCanvas { width: 100%; height: 100%; object-fit: contain; }

        .copyright-text {
            text-align: center; font-size: 9px; color: var(--text-muted); padding: 12px 0 16px; opacity: 0.6;
        }

        .hidden-canvas { display: none; }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="control-panel">
            <div class="panel-inner">
                <header class="panel-header"><span class="brand">WOODCUT TOOL</span></header>
                <div class="panel-scroll">
                    <!-- 上传 -->
                    <div class="upload-panel">
                        <div class="upload-area" id="uploadArea">
                            <span class="upload-text">Choose Image</span>
                            <div class="upload-preview">
                                <img id="contentImage">
                                <div class="upload-placeholder" id="uploadPlaceholder"><span class="upload-icon">●●</span></div>
                            </div>
                        </div>
                        <input type="file" id="imageUpload" accept="image/*">
                    </div>

                    <!-- 色彩方案 -->
                    <div class="color-palette-section">
                        <label class="control-label">色彩方案</label>
                        <div class="select-wrapper">
                            <select id="colorPalette">
                                <option value="classic" selected>经典 (纯白)</option>
                                <option value="red-black">红黑</option>
                                <option value="blue-ochre">蓝赭</option>
                                <option value="green-sepia">绿褐</option>
                                <option value="chinese-red">中国红</option>
                                <option value="prussian-blue">普鲁士蓝</option>
                                <option value="earth-tones">大地色</option>
                                <option value="japanese-indigo">日本靛蓝</option>
                            </select>
                            <svg class="select-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                    </div>

                    <!-- 自定义颜色 -->
                    <div class="color-controls">
                        <div class="color-row">
                            <div class="color-item"><span class="control-label">BG</span>
                                <button class="color-swatch" data-color="#FFC8DD" data-for="bg" style="background:#FFC8DD"></button>
                                <button class="color-swatch" data-color="#FDFFB6" data-for="bg" style="background:#FDFFB6"></button>
                                <button class="color-swatch" data-color="#9BF6FF" data-for="bg" style="background:#9BF6FF"></button>
                                <button class="color-swatch" data-color="#CAFFBF" data-for="bg" style="background:#CAFFBF"></button>
                                <div class="color-picker-wrapper">
                                    <input type="color" id="backgroundColor" value="#ffffff">
                                    <div class="color-display" id="bgDisplay"></div>
                                </div>
                            </div>
                        </div>
                        <div class="color-row">
                            <div class="color-item"><span class="control-label">FG</span>
                                <button class="color-swatch" data-color="#FF4D6D" data-for="fg" style="background:#FF4D6D"></button>
                                <button class="color-swatch" data-color="#FF9E00" data-for="fg" style="background:#FF9E00"></button>
                                <button class="color-swatch" data-color="#3A86FF" data-for="fg" style="background:#3A86FF"></button>
                                <button class="color-swatch" data-color="#00F5D4" data-for="fg" style="background:#00F5D4"></button>
                                <div class="color-picker-wrapper">
                                    <input type="color" id="foregroundColor" value="#1a0f0a">
                                    <div class="color-display" id="fgDisplay"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 参数 -->
                    <div class="controls-wrapper">
                        <div class="control-group">
                            <div class="control-header"><span>阈值</span><span class="control-value" id="thresholdValue">128</span></div>
                            <input type="range" id="threshold" min="0" max="255" value="128">
                        </div>
                        <div class="control-group">
                            <div class="control-header"><span>边缘强度</span><span class="control-value" id="edgeValue">3.0</span></div>
                            <input type="range" id="edgeStrength" min="0.5" max="5" value="3.0" step="0.1">
                        </div>
                        <div class="control-group">
                            <div class="control-header"><span>平滑度</span><span class="control-value" id="smoothnessValue">30</span></div>
                            <input type="range" id="smoothness" min="1" max="100" value="30">
                        </div>
                        <div class="control-group">
                            <div class="control-header"><span>细节保留</span><span class="control-value" id="detailValue">50</span></div>
                            <input type="range" id="detailLevel" min="1" max="100" value="50">
                        </div>
                    </div>

                    <div class="preset-section">
                        <label class="control-label">预设样式</label>
                        <div class="select-wrapper">
                            <select id="stylePreset">
                                <option value="graphic" selected>图形风格</option>
                                <option value="vans-style">VANS风格</option>
                                <option value="roche-style">Roche风格</option>
                                <option value="rough-woodcut">粗糙木刻</option>
                            </select>
                            <svg class="select-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                    </div>

                    <div class="download-section">
                        <span class="control-label">Export</span>
                        <div class="download-actions">
                            <button id="downloadJpg" class="btn btn-outline">JPG</button>
                            <button id="downloadPng" class="btn btn-outline">PNG</button>
                            <button id="downloadSvg" class="btn btn-outline">SVG</button>
                        </div>
                    </div>
                </div> 
                <div class="copyright-text">© 2025 Type play. All rights reserved.</div>
            </div>
        </aside>

        <main class="preview-area">
            <div class="canvas-stage" id="canvasStage">
                <canvas id="styledCanvas"></canvas>
            </div>
            <canvas id="originalCanvas" class="hidden-canvas"></canvas>
        </main>
    </div>
    <script>
        const getEl = id => document.getElementById(id);
        const hexToRgb = hex => { 
            const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16); 
            return {r,g,b}; 
        };
        const debounce = (fn, ms) => { 
            let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; 
        };

        const thresholdSlider = getEl('threshold'), edgeSlider = getEl('edgeStrength'), smoothnessSlider = getEl('smoothness'), detailSlider = getEl('detailLevel');
        const styledCanvas = getEl('styledCanvas'), originalCanvas = getEl('originalCanvas');
        const backgroundColorInput = getEl('backgroundColor'), foregroundColorInput = getEl('foregroundColor');

        let originalImageData = null, processedMask = null, currentImgObj = null;
        let imageRect = { x: 0, y: 0, w: 960, h: 1280 }; 
        const CANVAS_WIDTH = 960, CANVAS_HEIGHT = 1280; 

        const colorPalettes = {
            classic: { bg: '#ffffff', fg: '#1a0f0a' },
            'red-black': { bg: '#f5e6d3', fg: '#8b0000' },
            'blue-ochre': { bg: '#e8d5b7', fg: '#1e3a5f' },
            'green-sepia': { bg: '#ede5d8', fg: '#3a5f3a' },
            'chinese-red': { bg: '#f0e7d8', fg: '#c8102e' },
            'prussian-blue': { bg: '#e8e4d9', fg: '#003153' },
            'earth-tones': { bg: '#e9dcc9', fg: '#5d4e37' },
            'japanese-indigo': { bg: '#f0ece2', fg: '#264348' },
        };

        const stylePresets = {
            graphic: { threshold: 128, edge: 3.0, smoothness: 30, detail: 50 },
            'vans-style': { threshold: 140, edge: 4.0, smoothness: 20, detail: 60 },
            'roche-style': { threshold: 120, edge: 2.5, smoothness: 40, detail: 45 },
            'rough-woodcut': { threshold: 130, edge: 5.0, smoothness: 10, detail: 30 }
        };

        // 算法性能优化
        function applyGaussianBlur(data, w, h, r) {
            const out = new Uint8ClampedArray(data.length), size = r*2+1, kernel = [];
            let sum = 0;
            for(let i=0; i<size; i++) { const x = i-r; kernel[i] = Math.exp(-(x*x)/(2*r*r)); sum += kernel[i]; }
            for(let i=0; i<size; i++) kernel[i] /= sum;
            const temp = new Uint8ClampedArray(data.length);
            for(let y=0; y<h; y++) for(let x=0; x<w; x++) {
                let r_s=0, g_s=0, b_s=0;
                for(let k=-r; k<=r; k++) {
                    const px = Math.min(w-1, Math.max(0, x+k)), idx = (y*w+px)*4;
                    r_s += data[idx]*kernel[k+r]; g_s += data[idx+1]*kernel[k+r]; b_s += data[idx+2]*kernel[k+r];
                }
                const i = (y*w+x)*4; temp[i]=r_s; temp[i+1]=g_s; temp[i+2]=b_s; temp[i+3]=255;
            }
            for(let x=0; x<w; x++) for(let y=0; y<h; y++) {
                let r_s=0, g_s=0, b_s=0;
                for(let k=-r; k<=r; k++) {
                    const py = Math.min(h-1, Math.max(0, y+k)), idx = (py*w+x)*4;
                    r_s += temp[idx]*kernel[k+r]; g_s += temp[idx+1]*kernel[k+r]; b_s += temp[idx+2]*kernel[k+r];
                }
                const i = (y*w+x)*4; out[i]=r_s; out[i+1]=g_s; out[i+2]=b_s; out[i+3]=255;
            }
            return out;
        }

        function applySobel(data, w, h, str) {
            const out = new Uint8ClampedArray(data.length).fill(255); 
            const gx=[-1,0,1,-2,0,2,-1,0,1], gy=[-1,-2,-1,0,0,0,1,2,1];
            for(let y=1; y<h-1; y++) for(let x=1; x<w-1; x++) {
                let px=0, py=0;
                for(let ky=-1; ky<=1; ky++) for(let kx=-1; kx<=1; kx++) {
                    const i=((y+ky)*w+(x+kx))*4, lum=data[i]*0.3+data[i+1]*0.59+data[i+2]*0.11, k=(ky+1)*3+(kx+1);
                    px += gx[k]*lum; py += gy[k]*lum;
                }
                const edge = Math.sqrt(px*px+py*py)*str;
                const idx=(y*w+x)*4;
                out[idx] = out[idx+1] = out[idx+2] = edge>80?255:0; out[idx+3]=255;
            }
            return out;
        }

        function applyAdaptiveThreshold(data, w, h, thresh, detail) {
            const r = Math.max(3, Math.floor(10-(detail/100)*7)), gray = new Uint8ClampedArray(w*h);
            for(let i=0, j=0; i<data.length; i+=4, j++) gray[j] = data[i]*0.3+data[i+1]*0.59+data[i+2]*0.11;
            const integral = new Float32Array((w+1)*(h+1));
            for(let y=0; y<h; y++) {
                let rowSum = 0;
                for(let x=0; x<w; x++) {
                    rowSum += gray[y*w+x];
                    integral[(y+1)*(w+1) + (x+1)] = integral[y*(w+1)+(x+1)] + rowSum;
                }
            }
            const out = new Uint8ClampedArray(data.length).fill(255); 
            const offset = 2;
            const threshFactor = thresh/128;
            for(let y=0; y<h; y++) {
                for(let x=0; x<w; x++) {
                    const x1=Math.max(0,x-r), y1=Math.max(0,y-r), x2=Math.min(w-1,x+r), y2=Math.min(h-1,y+r);
                    const sum = integral[(y2+1)*(w+1)+(x2+1)] - integral[y1*(w+1)+(x2+1)] - integral[(y2+1)*(w+1)+x1] + integral[y1*(w+1)+x1];
                    const count = (x2-x1+1)*(y2-y1+1);
                    const val = (gray[y*w+x] + offset) >= (sum/count)*threshFactor ? 255 : 0;
                    const i=(y*w+x)*4; out[i]=out[i+1]=out[i+2]=val; out[i+3]=255;
                }
            }
            return out;
        }

        const scheduleUpdate = debounce(recompute => {
            if(!originalImageData) return;
            const w = CANVAS_WIDTH, h = CANVAS_HEIGHT;
            const params = { smoothness:parseInt(smoothnessSlider.value), edge:parseFloat(edgeSlider.value), threshold:parseInt(thresholdSlider.value), detail:parseInt(detailSlider.value) };
            
            if(recompute || !processedMask) {
                let d = new Uint8ClampedArray(originalImageData.data);
                const r = Math.max(1, Math.floor((params.smoothness/100)*5));
                if(r>1) d = applyGaussianBlur(d, w, h, r);
                d = applySobel(d, w, h, params.edge);
                processedMask = applyAdaptiveThreshold(d, w, h, params.threshold, params.detail);
                
                const CLEAR_MARGIN = 40; 
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const isVoid = (x <= imageRect.x + CLEAR_MARGIN || x >= imageRect.x + imageRect.w - CLEAR_MARGIN || 
                                        y <= imageRect.y + CLEAR_MARGIN || y >= imageRect.y + imageRect.h - CLEAR_MARGIN ||
                                        x < CLEAR_MARGIN || x > w - CLEAR_MARGIN || y < CLEAR_MARGIN || y > h - CLEAR_MARGIN);
                        if (isVoid) {
                            const idx = (y * w + x) * 4;
                            processedMask[idx] = processedMask[idx+1] = processedMask[idx+2] = 255; 
                        }
                    }
                }
            }

            const ctx = styledCanvas.getContext('2d');
            styledCanvas.width = w; styledCanvas.height = h;
            const final = ctx.createImageData(w, h), bg=hexToRgb(backgroundColorInput.value), fg=hexToRgb(foregroundColorInput.value);
            
            for(let i=0; i<final.data.length; i+=4) {
                const isFg = processedMask[i] < 128;
                final.data[i] = isFg?fg.r:bg.r;
                final.data[i+1] = isFg?fg.g:bg.g;
                final.data[i+2] = isFg?fg.b:bg.b;
                final.data[i+3] = 255;
            }
            ctx.putImageData(final, 0, 0);
            getEl('bgDisplay').style.backgroundColor = backgroundColorInput.value;
            getEl('fgDisplay').style.backgroundColor = foregroundColorInput.value;
        }, 50);

        function updateOriginalCanvas() {
            if(!currentImgObj) return;
            originalCanvas.width = CANVAS_WIDTH; originalCanvas.height = CANVAS_HEIGHT;
            const ctx = originalCanvas.getContext('2d');
            ctx.fillStyle = backgroundColorInput.value;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            const scale = Math.min(CANVAS_WIDTH / currentImgObj.width, CANVAS_HEIGHT / currentImgObj.height);
            const dw = Math.floor(currentImgObj.width * scale) - 10; 
            const dh = Math.floor(currentImgObj.height * scale) - 10;
            const dx = Math.floor((CANVAS_WIDTH - dw) / 2);
            const dy = Math.floor((CANVAS_HEIGHT - dh) / 2);

            imageRect = { x: dx, y: dy, w: dw, h: dh };
            ctx.drawImage(currentImgObj, dx, dy, dw, dh);
            originalImageData = ctx.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            processedMask = null;
            scheduleUpdate(true);
        }

        function exportSvg() {
            if(!processedMask) return;
            const w = CANVAS_WIDTH, h = CANVAS_HEIGHT;
            const fgHex = foregroundColorInput.value;
            let pathData = "";
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    if (processedMask[idx] < 128) {
                        let startX = x;
                        while (x < w && processedMask[(y * w + x) * 4] < 128) { x++; }
                        pathData += `M${startX},${y+0.5}h${x-startX}`;
                    }
                }
            }
            const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
                <path d="${pathData}" stroke="${fgHex}" stroke-width="1.1" fill="none" shape-rendering="crispEdges" />
            </svg>`;
            const blob = new Blob([svgStr], {type: 'image/svg+xml'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = 'woodcut_vector.svg'; a.click();
        }

        // 事件监听
        getEl('uploadArea').onclick = () => getEl('imageUpload').click();
        getEl('imageUpload').onchange = e => {
            const file = e.target.files[0];
            if(file) {
                const img = new Image(), reader = new FileReader();
                reader.onload = ev => {
                    img.onload = () => {
                        currentImgObj = img;
                        getEl('contentImage').src = ev.target.result;
                        getEl('contentImage').style.display = 'block';
                        getEl('uploadPlaceholder').style.display = 'none';
                        updateOriginalCanvas();
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        [thresholdSlider, edgeSlider, smoothnessSlider, detailSlider].forEach(s => s.oninput = () => {
            const displayId = s.id === 'edgeStrength' ? 'edgeValue' : s.id === 'detailLevel' ? 'detailValue' : s.id + 'Value';
            getEl(displayId).textContent = s.value;
            scheduleUpdate(true);
        });

        getEl('colorPalette').onchange = (e) => {
            const p = colorPalettes[e.target.value];
            backgroundColorInput.value = p.bg;
            foregroundColorInput.value = p.fg;
            updateOriginalCanvas();
        };

        getEl('stylePreset').onchange = (e) => {
            const p = stylePresets[e.target.value];
            thresholdSlider.value = p.threshold;
            edgeSlider.value = p.edge;
            smoothnessSlider.value = p.smoothness;
            detailSlider.value = p.detail;
            ['threshold', 'edgeStrength', 'smoothness', 'detailLevel'].forEach(id => {
                const slider = getEl(id);
                const displayId = id === 'edgeStrength' ? 'edgeValue' : id === 'detailLevel' ? 'detailValue' : id + 'Value';
                getEl(displayId).textContent = slider.value;
            });
            scheduleUpdate(true);
        };

        getEl('backgroundColor').oninput = () => updateOriginalCanvas();
        getEl('foregroundColor').oninput = () => scheduleUpdate(false);

        document.querySelectorAll('.color-swatch').forEach(s => s.onclick = () => {
            const c = s.dataset.color, t = s.dataset.for;
            if(t==='bg') { backgroundColorInput.value = c; updateOriginalCanvas(); }
            else { foregroundColorInput.value = c; scheduleUpdate(false); }
        });

        // PNG 导出：透明底优化
        getEl('downloadPng').onclick = () => {
            if(!processedMask) return;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = CANVAS_WIDTH;
            tempCanvas.height = CANVAS_HEIGHT;
            const tCtx = tempCanvas.getContext('2d');
            const fg = hexToRgb(foregroundColorInput.value);
            const imgData = tCtx.createImageData(CANVAS_WIDTH, CANVAS_HEIGHT);

            for(let i=0; i<imgData.data.length; i+=4) {
                const isFg = processedMask[i] < 128;
                if(isFg) {
                    imgData.data[i] = fg.r;
                    imgData.data[i+1] = fg.g;
                    imgData.data[i+2] = fg.b;
                    imgData.data[i+3] = 255;
                } else {
                    imgData.data[i+3] = 0; // 透明
                }
            }
            tCtx.putImageData(imgData, 0, 0);
            const a = document.createElement('a');
            a.download = 'woodcut_transparent.png';
            a.href = tempCanvas.toDataURL('image/png');
            a.click();
        };

        getEl('downloadJpg').onclick = () => { 
            const a=document.createElement('a'); a.download='woodcut.jpg'; 
            a.href=styledCanvas.toDataURL('image/jpeg', 0.9); a.click(); 
        };
        
        getEl('downloadSvg').onclick = exportSvg;
    </script>
</body>
</html>
